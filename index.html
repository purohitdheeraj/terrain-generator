<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Terrain Generator</h1>
    <button id="generate">Generate</button>
    <label>
      Terrain generation:
      <select id="generation-mode">
        <option value="random">Random</option>
        <option value="linear" selected>Linear interpolate</option>
        <option value="cosine">Cosine interpolate</option>
        <option value="perlin">Perlin noise</option>
        <option value="simplex">Simplex noise</option>
      </select>
    </label>
    <div>
      <label>
        <input type="checkbox" id="toggle-terrain" checked />
        Terrain
      </label>
      <label>
        <input type="checkbox" id="toggle-valleys" checked />
        Valleys
      </label>
      <label>
        <input type="checkbox" id="toggle-peaks" checked />
        Peaks
      </label>
      <label>
        <input type="checkbox" id="toggle-nse" checked />
        NSE
      </label>
      <label>
        <input type="checkbox" id="toggle-pse" checked />
        PSE
      </label>
      <label>
        <input type="checkbox" id="toggle-ridge" checked />
        Ridge
      </label>
    </div>
    <canvas id="terrain" width="600" height="400"></canvas>
    <script type="module" src="index.js"></script>
  </body>
</html>
